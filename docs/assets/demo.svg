<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'SF Mono','Menlo','Consolas','DejaVu Sans Mono',monospace" font-size="13">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1b26"/>
      <stop offset="100%" stop-color="#16161e"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#24283b"/>
      <stop offset="100%" stop-color="#1f2335"/>
    </linearGradient>
  </defs>

  <!-- Window frame -->
  <rect width="900" height="620" rx="10" fill="url(#bg)"/>
  <rect width="900" height="36" rx="10" fill="url(#header)"/>
  <rect x="0" y="26" width="900" height="10" fill="url(#header)"/>

  <!-- Window controls -->
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>

  <!-- Title bar -->
  <text x="450" y="22" text-anchor="middle" fill="#787c99" font-size="12">Claude — eth-library-mcp</text>

  <!-- User query -->
  <rect x="20" y="50" width="860" height="44" rx="6" fill="#1f2335" stroke="#3d59a1" stroke-width="1" opacity="0.7"/>
  <text x="36" y="68" fill="#7aa2f7" font-size="11" font-weight="bold">You</text>
  <text x="36" y="84" fill="#c0caf5">Find historical documents about Zurich school history in the ETH archives.</text>

  <!-- Tool call box -->
  <rect x="20" y="108" width="860" height="120" rx="6" fill="#1a1b26" stroke="#3d59a1" stroke-width="1" opacity="0.5"/>
  <rect x="20" y="108" width="860" height="24" rx="6" fill="#24283b"/>
  <rect x="20" y="126" width="860" height="2" fill="#24283b"/>
  <text x="36" y="124" fill="#bb9af7" font-size="11" font-weight="bold">Tool Call: eth_search_archive</text>
  <text x="40" y="148" fill="#565f89" font-size="12">{</text>
  <text x="56" y="164" fill="#73daca" font-size="12">"archive"</text><text x="130" y="164" fill="#565f89" font-size="12">: </text><text x="142" y="164" fill="#9ece6a" font-size="12">"ETH_Hochschularchiv"</text><text x="330" y="164" fill="#565f89" font-size="12">,</text>
  <text x="56" y="180" fill="#73daca" font-size="12">"query"</text><text x="114" y="180" fill="#565f89" font-size="12">: </text><text x="126" y="180" fill="#9ece6a" font-size="12">"any,contains,Schulgeschichte Zürich"</text><text x="434" y="180" fill="#565f89" font-size="12">,</text>
  <text x="56" y="196" fill="#73daca" font-size="12">"limit"</text><text x="114" y="196" fill="#565f89" font-size="12">: </text><text x="126" y="196" fill="#ff9e64" font-size="12">10</text>
  <text x="40" y="212" fill="#565f89" font-size="12">}</text>

  <!-- Result box -->
  <rect x="20" y="242" width="860" height="352" rx="6" fill="#1f2335" stroke="#3d59a1" stroke-width="1" opacity="0.4"/>
  <text x="36" y="264" fill="#bb9af7" font-size="11" font-weight="bold">Claude</text>

  <!-- Result header -->
  <text x="36" y="288" fill="#7aa2f7" font-size="14" font-weight="bold">Hochschularchiv ETH Zürich</text>
  <text x="36" y="308" fill="#c0caf5" font-size="12">Treffer im Archiv: 847 total, zeige 1–10</text>

  <!-- Result items -->
  <text x="36" y="336" fill="#ff9e64" font-size="12">1.</text>
  <text x="56" y="336" fill="#c0caf5" font-weight="bold" font-size="12">Volksschulwesen der Stadt Zürich 1832–1960</text>
  <text x="56" y="352" fill="#787c99" font-size="11">von Erziehungsdirektion Zürich (1960) [archival_material] MMS-ID: 991170525863705501</text>

  <text x="36" y="376" fill="#ff9e64" font-size="12">2.</text>
  <text x="56" y="376" fill="#c0caf5" font-weight="bold" font-size="12">Schulreform und Lehrerbildung an der ETH</text>
  <text x="56" y="392" fill="#787c99" font-size="11">von Guggenbühl, Gottfried (1948) [archival_material] MMS-ID: 990044781230205503</text>

  <text x="36" y="416" fill="#ff9e64" font-size="12">3.</text>
  <text x="56" y="416" fill="#c0caf5" font-weight="bold" font-size="12">Dokumente zur Zürcher Bildungsgeschichte</text>
  <text x="56" y="432" fill="#787c99" font-size="11">von Hochschularchiv ETH (2005) [archival_material] MMS-ID: 990078432100205503</text>

  <text x="36" y="456" fill="#ff9e64" font-size="12">4.</text>
  <text x="56" y="456" fill="#c0caf5" font-weight="bold" font-size="12">Pädagogische Reformbewegung in der Schweiz</text>
  <text x="56" y="472" fill="#787c99" font-size="11">von Oelkers, Jürgen (1999) [book] MMS-ID: 990023156780205503</text>

  <text x="36" y="496" fill="#ff9e64" font-size="12">5.</text>
  <text x="56" y="496" fill="#c0caf5" font-weight="bold" font-size="12">Photographien: Schulhäuser Zürich 1890–1940</text>
  <text x="56" y="512" fill="#787c99" font-size="11">von Bildarchiv ETH (1940) [image] MMS-ID: 990065891230205503</text>

  <!-- Pagination hint -->
  <text x="36" y="544" fill="#565f89" font-size="11" font-style="italic">Weitere Ergebnisse: offset=10 verwenden (837 verbleibend)</text>

  <!-- Badge -->
  <rect x="36" y="562" width="180" height="22" rx="4" fill="#3d59a1" opacity="0.3"/>
  <text x="46" y="577" fill="#7aa2f7" font-size="10">Discovery API • 30M+ resources</text>

  <rect x="226" y="562" width="140" height="22" rx="4" fill="#3d59a1" opacity="0.3"/>
  <text x="236" y="577" fill="#7aa2f7" font-size="10">5 archives available</text>

  <rect x="376" y="562" width="120" height="22" rx="4" fill="#3d59a1" opacity="0.3"/>
  <text x="386" y="577" fill="#7aa2f7" font-size="10">Public Domain</text>
</svg>
